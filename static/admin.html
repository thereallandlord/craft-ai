<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft AI — Админ</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f9f9f9;
            --bg-tertiary: #f4f4f4;
            --bg-hover: #ececec;
            --border: #e5e5e5;
            --border-light: #f0f0f0;
            --text-primary: #0d0d0d;
            --text-secondary: #6e6e6e;
            --text-muted: #9a9a9a;
            --accent: #0d0d0d;
            --accent-light: #f4f4f4;
            --sidebar-bg: #f9f9f9;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* === Login === */
        .login-container {
            display: flex; align-items: center; justify-content: center;
            height: 100vh; padding: 20px;
        }
        .login-box { width: 100%; max-width: 360px; text-align: center; }
        .login-box h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .login-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .login-input {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 12px; font-size: 15px; outline: none; background: var(--bg-secondary);
        }
        .login-input:focus { border-color: var(--accent); }
        .login-btn {
            width: 100%; padding: 12px; margin-top: 12px; background: var(--accent);
            color: #fff; border: none; border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-error { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }

        /* === App Layout (same as index.html) === */
        .app { display: none; height: 100vh; position: relative; }

        /* Sidebar */
        .project-sidebar {
            width: 260px; background: var(--sidebar-bg);
            display: flex; flex-direction: column; flex-shrink: 0;
            overflow: hidden; z-index: 100;
        }
        .ps-header {
            padding: 12px 12px 4px; display: flex; align-items: center; gap: 8px;
        }
        .ps-logo {
            font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1;
        }
        .ps-new-btn {
            width: 32px; height: 32px; background: transparent; border: none;
            color: var(--text-secondary); border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s ease, color 0.15s ease;
        }
        .ps-new-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .ps-nav { padding: 4px 8px 8px; }
        .ps-nav-item {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; border-radius: 8px; cursor: pointer;
            color: var(--text-primary); font-size: 14px;
            border: none; background: none; width: 100%; text-align: left;
            transition: background 0.15s ease;
        }
        .ps-nav-item:hover { background: var(--bg-hover); }
        .ps-nav-item.active { background: var(--bg-hover); }
        .ps-user-section {
            padding: 8px 12px 12px; display: flex; align-items: center; gap: 10px;
            cursor: pointer; border-radius: 16px; margin: auto 8px 8px;
            transition: background 0.15s ease;
        }
        .ps-user-section:hover { background: var(--bg-hover); }
        .ps-user-name {
            font-size: 14px; color: var(--text-primary); flex: 1;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* Content Area */
        .content-area {
            flex: 1; position: relative; min-width: 0;
            display: flex; overflow: hidden;
        }

        /* Panels */
        .panel {
            flex: 1; display: none; flex-direction: column; overflow-y: auto;
        }
        .panel.active { display: flex; }
        .panel-content {
            flex: 1; padding: 40px; max-width: 960px; margin: 0 auto; width: 100%;
        }
        .panel-title {
            font-size: 24px; font-weight: 700; margin-bottom: 8px;
        }
        .panel-subtitle {
            font-size: 14px; color: var(--text-secondary); margin-bottom: 32px;
        }

        /* Cards */
        .card {
            border: 1px solid var(--border); border-radius: 12px;
            padding: 16px; margin-bottom: 16px;
        }
        .card-clickable { cursor: pointer; transition: background 0.15s; }
        .card-clickable:hover { background: var(--bg-secondary); }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .card-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }

        /* Form */
        .textarea {
            width: 100%; min-height: 200px; padding: 12px;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 8px; color: var(--text-primary); font-size: 13px;
            font-family: monospace; resize: vertical; outline: none;
        }
        .textarea:focus { border-color: var(--accent); }
        .select {
            padding: 6px 10px; font-size: 13px; border: 1px solid var(--border);
            border-radius: 8px; background: var(--bg-secondary); outline: none; flex: 1;
        }
        .btn-save {
            padding: 8px 16px; background: var(--accent); color: #fff;
            border: none; border-radius: 8px; font-size: 13px; cursor: pointer; margin-top: 8px;
        }
        .btn-save:hover { opacity: 0.9; }
        .btn-back {
            background: none; border: none; color: var(--accent);
            font-size: 13px; cursor: pointer; padding: 10px 0; display: block;
        }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px; padding: 10px 16px;
            border-radius: 8px; font-size: 13px; color: #fff; z-index: 999;
            opacity: 0; transition: opacity .3s;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #22c55e; }
        .toast.error { background: #ef4444; }

        /* Log table */
        .log-header {
            display: flex; gap: 8px; padding: 8px 0; font-size: 11px;
            font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border);
        }
        .log-row {
            display: flex; gap: 8px; padding: 8px 0; font-size: 12px;
            align-items: center; cursor: pointer; border-radius: 8px;
        }
        .log-row:hover { background: var(--bg-secondary); }

        /* Chat */
        .msg { display: flex; margin: 4px 0; }
        .msg-bubble {
            max-width: 85%; padding: 8px 12px; border-radius: 12px;
            font-size: 13px; line-height: 1.4;
        }
        .msg-user { justify-content: flex-end; }
        .msg-user .msg-bubble { background: var(--accent); color: #000; }
        .msg-ai .msg-bubble { background: var(--bg-secondary); color: var(--text-primary); }
        .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; text-align: right; }

        .loading { padding: 40px; color: var(--text-muted); text-align: center; }
        .error-msg { padding: 40px; color: #ef4444; text-align: center; }

        /* Mobile sidebar */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 999;
        }
        .sidebar-overlay.visible { display: block; }
        .mobile-header {
            display: none; padding: 12px 16px; border-bottom: 1px solid var(--border);
            align-items: center; gap: 12px;
        }
        .mobile-header button {
            width: 36px; height: 36px; background: none; border: none;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-primary); cursor: pointer; border-radius: 8px;
        }
        .mobile-header span { font-size: 17px; font-weight: 600; }

        @media (max-width: 768px) {
            .project-sidebar {
                position: fixed; top: 0; left: 0; bottom: 0; z-index: 1000;
                width: 280px; transform: translateX(-100%); transition: transform 0.2s ease;
            }
            .project-sidebar.mobile-open { transform: translateX(0); }
            .mobile-header { display: flex; }
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div class="login-container" id="loginView">
        <div class="login-box">
            <h1>Craft AI</h1>
            <p>Панель администратора</p>
            <input type="password" class="login-input" id="passwordInput" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
            <button class="login-btn" onclick="doLogin()">Войти</button>
            <div class="login-error" id="loginError">Неверный пароль</div>
        </div>
    </div>

    <!-- App -->
    <div class="app" id="appView">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>

        <aside class="project-sidebar" id="projectSidebar">
            <div class="ps-header">
                <span class="ps-logo">Craft AI</span>
                <button class="ps-new-btn" onclick="toggleSidebar()" title="Свернуть">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
                </button>
            </div>
            <div class="ps-nav">
                <button class="ps-nav-item active" data-tab="home" onclick="switchTab('home')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Главная
                </button>
                <button class="ps-nav-item" data-tab="prompts" onclick="switchTab('prompts')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    Промпты
                </button>
                <button class="ps-nav-item" data-tab="dialogs" onclick="switchTab('dialogs')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Диалоги
                </button>
                <button class="ps-nav-item" data-tab="logs" onclick="switchTab('logs')">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    AI Логи
                </button>
            </div>
            <div class="ps-user-section" onclick="doLogout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="ps-user-name">Выйти</span>
            </div>
        </aside>

        <div class="content-area">
            <div class="mobile-header" id="mobileHeader">
                <button onclick="toggleSidebar()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span>Craft AI — Админ</span>
            </div>

            <!-- Home -->
            <div class="panel active" id="panel-home">
                <div class="panel-content">
                    <div class="panel-title">Главная</div>
                    <div class="panel-subtitle">Статистика сервиса</div>
                    <div id="dashboardContent">
                        <div class="loading">Загрузка...</div>
                    </div>
                </div>
            </div>

            <!-- Промпты -->
            <div class="panel" id="panel-prompts">
                <div class="panel-content" id="promptsContent"></div>
            </div>

            <!-- Диалоги -->
            <div class="panel" id="panel-dialogs">
                <div class="panel-content" id="dialogsContent"></div>
            </div>

            <!-- AI Логи -->
            <div class="panel" id="panel-logs">
                <div class="panel-content" id="logsContent"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_URL = window.location.origin;
        let adminToken = sessionStorage.getItem('admin_token') || '';
        let _adminUsersCache = null;
        let _adminDashCache = null;

        function escapeHtml(s) {
            if (!s) return '';
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.className = 'toast', 2500);
        }

        function api(url, opts = {}) {
            opts.headers = opts.headers || {};
            opts.headers['X-Admin-Token'] = adminToken;
            if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof FormData)) {
                opts.headers['Content-Type'] = 'application/json';
                opts.body = JSON.stringify(opts.body);
            }
            return fetch(API_URL + url, opts);
        }

        // === Auth ===
        async function doLogin() {
            const pw = document.getElementById('passwordInput').value;
            if (!pw) return;
            try {
                const r = await fetch(API_URL + '/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: pw})
                });
                if (r.ok) {
                    adminToken = pw;
                    sessionStorage.setItem('admin_token', pw);
                    showApp();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch(e) {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function doLogout() {
            adminToken = '';
            _adminUsersCache = null;
            _adminDashCache = null;
            sessionStorage.removeItem('admin_token');
            document.getElementById('appView').style.display = 'none';
            document.getElementById('loginView').style.display = 'flex';
        }

        function showApp() {
            document.getElementById('loginView').style.display = 'none';
            document.getElementById('appView').style.display = 'flex';
            switchTab('home');
        }

        // === Sidebar ===
        function toggleSidebar() {
            const sidebar = document.getElementById('projectSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('mobile-open');
                overlay.classList.toggle('visible');
            }
        }
        function closeMobileSidebar() {
            document.getElementById('projectSidebar').classList.remove('mobile-open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        // === Tabs ===
        function switchTab(tabId) {
            document.querySelectorAll('.ps-nav-item').forEach(n => n.classList.toggle('active', n.dataset.tab === tabId));
            document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tabId));
            closeMobileSidebar();
            if (tabId === 'home') loadDashboard();
            if (tabId === 'prompts') loadPrompts();
            if (tabId === 'dialogs') loadDialogs();
            if (tabId === 'logs') loadLogs();
        }

        // === Дашборд ===
        function formatNum(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
            return String(n);
        }

        function renderDashboard(d) {
            const c = document.getElementById('dashboardContent');
            // Метрики
            let h = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
                <div class="card" style="padding:16px;text-align:center;">
                    <div style="font-size:28px;font-weight:700;color:var(--primary);">${d.total_users}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Всего пользователей</div>
                </div>
                <div class="card" style="padding:16px;text-align:center;">
                    <div style="font-size:28px;font-weight:700;color:#22c55e;">${d.active_today}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Активных сегодня</div>
                </div>
                <div class="card" style="padding:16px;text-align:center;">
                    <div style="font-size:28px;font-weight:700;color:#f59e0b;">${d.total_carousels}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Скачано каруселей</div>
                </div>
                <div class="card" style="padding:16px;text-align:center;">
                    <div style="font-size:28px;font-weight:700;color:#8b5cf6;">${formatNum(d.total_tokens)}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Токенов использовано</div>
                </div>
            </div>`;
            // Средние токены
            h += `<div class="card" style="padding:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:13px;color:var(--text-muted);">Среднее на пользователя</span>
                <span style="font-size:18px;font-weight:600;">${formatNum(d.avg_tokens_per_user)} токенов</span>
            </div>`;
            // График
            const usage = d.daily_usage || [];
            if (usage.length > 1) {
                const maxVal = Math.max(...usage.map(u => u.count), 1);
                const W = 600, H = 180, padL = 40, padB = 30, padT = 10, padR = 10;
                const chartW = W - padL - padR, chartH = H - padT - padB;
                const stepX = chartW / (usage.length - 1);
                const points = usage.map((u, i) => `${padL + i * stepX},${padT + chartH - (u.count / maxVal) * chartH}`);
                const polyline = points.join(' ');
                const area = `${padL},${padT + chartH} ${polyline} ${padL + (usage.length - 1) * stepX},${padT + chartH}`;
                // Подписи по X (каждый 7й день)
                let xLabels = '';
                usage.forEach((u, i) => {
                    if (i % 7 === 0 || i === usage.length - 1) {
                        const d = new Date(u.date);
                        xLabels += `<text x="${padL + i * stepX}" y="${H - 4}" text-anchor="middle" fill="var(--text-muted)" font-size="10">${d.getDate()}.${String(d.getMonth()+1).padStart(2,'0')}</text>`;
                    }
                });
                // Линии сетки по Y
                let yLines = '', yLabels = '';
                for (let i = 0; i <= 3; i++) {
                    const y = padT + chartH - (i / 3) * chartH;
                    const val = Math.round(maxVal * i / 3);
                    yLines += `<line x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" stroke="var(--border)" stroke-width="0.5"/>`;
                    yLabels += `<text x="${padL - 6}" y="${y + 4}" text-anchor="end" fill="var(--text-muted)" font-size="10">${val}</text>`;
                }
                h += `<div class="card" style="padding:16px;">
                    <div style="font-size:13px;font-weight:600;margin-bottom:12px;">AI-вызовы за 30 дней</div>
                    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
                        ${yLines}${yLabels}
                        <polygon points="${area}" fill="var(--primary)" opacity="0.1"/>
                        <polyline points="${polyline}" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
                        ${xLabels}
                    </svg>
                </div>`;
            } else {
                h += `<div class="card" style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">Данных для графика пока недостаточно</div>`;
            }
            c.innerHTML = h;
        }

        async function loadDashboard() {
            const c = document.getElementById('dashboardContent');
            if (_adminDashCache) {
                renderDashboard(_adminDashCache);
            } else {
                c.innerHTML = '<div class="loading">Загрузка...</div>';
            }
            try {
                const r = await api('/api/admin/dashboard');
                if (!r.ok) { if (!_adminDashCache) c.innerHTML = '<div class="error-msg">Ошибка</div>'; return; }
                const data = await r.json();
                _adminDashCache = data;
                renderDashboard(data);
            } catch(e) {
                if (!_adminDashCache) c.innerHTML = '<div class="error-msg">Ошибка загрузки</div>';
            }
        }

        // === Промпты ===
        async function loadPrompts() {
            const c = document.getElementById('promptsContent');
            c.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const r = await api('/api/admin/prompts');
                if (!r.ok) { c.innerHTML = '<div class="error-msg">Ошибка загрузки</div>'; return; }
                const prompts = await r.json();
                if (!prompts.length) { c.innerHTML = '<div class="loading">Нет промптов</div>'; return; }
                const models = [
                    {value: 'openai/gpt-4o', label: 'GPT-4o'},
                    {value: 'openai/gpt-4o-mini', label: 'GPT-4o Mini'},
                    {value: 'google/gemini-2.5-pro', label: 'Gemini 2.5 Pro'},
                    {value: 'google/gemini-2.5-flash', label: 'Gemini 2.5 Flash'},
                    {value: 'anthropic/claude-sonnet-4.5', label: 'Claude Sonnet 4.5'},
                ];
                c.innerHTML = prompts.map(p => {
                    const cur = p.model || 'openai/gpt-4o';
                    const opts = models.map(m => `<option value="${m.value}" ${m.value===cur?'selected':''}>${m.label}</option>`).join('');
                    return `<div class="card" data-key="${p.prompt_key}">
                        <div class="card-title">${escapeHtml(p.title)}</div>
                        <div class="card-subtitle">${p.prompt_key}${p.description ? ' — ' + escapeHtml(p.description) : ''}</div>
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                            <label style="font-size:12px;color:var(--text-muted);font-weight:500;white-space:nowrap;">Модель:</label>
                            <select class="select" id="model-${p.prompt_key}">${opts}</select>
                        </div>
                        <textarea class="textarea" id="prompt-${p.prompt_key}">${escapeHtml(p.content)}</textarea>
                        <button class="btn-save" onclick="savePrompt('${p.prompt_key}')">Сохранить</button>
                    </div>`;
                }).join('');
            } catch(e) { c.innerHTML = '<div class="error-msg">Ошибка</div>'; }
        }

        async function savePrompt(key) {
            const content = document.getElementById('prompt-' + key)?.value;
            const model = document.getElementById('model-' + key)?.value;
            if (!content) return;
            try {
                const r = await api('/api/admin/prompts/' + key, {method:'PUT', body:{content, model}});
                showToast(r.ok ? 'Сохранено' : 'Ошибка', r.ok ? 'success' : 'error');
            } catch(e) { showToast('Ошибка', 'error'); }
        }

        // === Диалоги ===
        function renderDialogUsers(users) {
            const c = document.getElementById('dialogsContent');
            if (!users.length) { c.innerHTML = '<div class="loading">Пользователей нет</div>'; return; }
            c.innerHTML = users.map(u => {
                const displayName = (u.first_name || u.last_name) ? escapeHtml((u.first_name || '') + ' ' + (u.last_name || '')).trim() : 'Пользователь';
                const initial = (u.first_name || u.last_name || '?')[0].toUpperCase();
                const ig = u.instagram_usernames;
                const igName = (() => { if (!ig) return ''; const name = Array.isArray(ig) ? ig[0] : ig; return (name && name !== 'undefined') ? '@' + name : ''; })();
                const uname = u.username ? '@' + escapeHtml(u.username) : '';
                const secondaryParts = [igName, uname, 'ID: ' + u.user_id].filter(Boolean);
                return `
                <div class="card card-clickable" onclick="loadUserTopics(${u.user_id})" style="padding:12px;">
                    <div style="display:flex;gap:12px;align-items:flex-start;">
                        <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px;">
                            ${u.photo_url ? `<img src="${escapeHtml(u.photo_url)}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.textContent='${initial}'">` : initial}
                        </div>
                        <div style="flex:1;min-width:0;">
                            <div style="display:flex;justify-content:space-between;align-items:center;">
                                <div style="font-weight:600;font-size:14px;">${displayName}</div>
                                <div style="font-size:11px;color:var(--text-muted);flex-shrink:0;margin-left:8px;">${u.topic_count || 0} топиков · ${u.memory_count || 0} фактов</div>
                            </div>
                            <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${secondaryParts.join(' · ')}</div>
                            ${u.profile_summary ? `<div style="font-size:11px;color:var(--text-muted);margin-top:6px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escapeHtml(u.profile_summary)}</div>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        async function loadDialogs() {
            const c = document.getElementById('dialogsContent');
            // Мгновенный рендер из кэша
            if (_adminUsersCache) {
                renderDialogUsers(_adminUsersCache);
            } else {
                c.innerHTML = '<div class="loading">Загрузка...</div>';
            }
            // Фоновый fetch с сервера
            try {
                const r = await api('/api/admin/users');
                if (!r.ok) { if (!_adminUsersCache) c.innerHTML = '<div class="error-msg">Ошибка</div>'; return; }
                const users = await r.json();
                _adminUsersCache = users;
                renderDialogUsers(users);
            } catch(e) {
                if (!_adminUsersCache) c.innerHTML = '<div class="error-msg">Ошибка загрузки</div>';
            }
        }

        async function loadUserTopics(userId) {
            const c = document.getElementById('dialogsContent');
            c.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const r = await api('/api/admin/users/' + userId + '/topics');
                if (!r.ok) return;
                const topics = await r.json();
                let h = `<button class="btn-back" onclick="loadDialogs()">← Назад к пользователям</button>
                    <div style="padding:4px 0 12px;font-size:12px;color:var(--text-muted);">Пользователь ${userId} — ${topics.length} топиков</div>`;
                h += topics.map(t => `
                    <div class="card card-clickable" onclick="loadTopicChat('${t.id}', ${userId})">
                        <div style="display:flex;justify-content:space-between;">
                            <div style="font-weight:500;font-size:13px;">${escapeHtml((t.title || t.idea_text || 'Без названия')).substring(0,60)}</div>
                            <div style="font-size:11px;color:var(--text-muted);">${t.message_count} сообщ.</div>
                        </div>
                        <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">${new Date(t.created_at).toLocaleString('ru-RU')}</div>
                    </div>
                `).join('');
                c.innerHTML = h;
            } catch(e) { c.innerHTML = '<div class="error-msg">Ошибка</div>'; }
        }

        async function loadTopicChat(topicId, userId) {
            const c = document.getElementById('dialogsContent');
            c.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const r = await api('/api/admin/topics/' + topicId + '/messages');
                if (!r.ok) return;
                const msgs = await r.json();
                let h = `<button class="btn-back" onclick="loadUserTopics(${userId})">← Назад к топикам</button>
                    <div style="padding:4px 0 12px;font-size:12px;color:var(--text-muted);">${msgs.length} сообщений</div>`;
                msgs.forEach(m => {
                    const isUser = m.role === 'user';
                    const cls = isUser ? 'msg-user' : 'msg-ai';
                    const content = escapeHtml(m.content || '').substring(0, 1000).replace(/\n/g, '<br>');
                    const time = new Date(m.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
                    h += `<div class="msg ${cls}"><div class="msg-bubble">${content}<div class="msg-time">${time} · ${m.message_type || 'text'}</div></div></div>`;
                });
                c.innerHTML = h;
            } catch(e) { c.innerHTML = '<div class="error-msg">Ошибка</div>'; }
        }

        // === AI Логи ===
        async function loadLogs() {
            const c = document.getElementById('logsContent');
            c.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const r = await api('/api/admin/logs?limit=200');
                if (!r.ok) {
                    const err = await r.text().catch(()=>'');
                    c.innerHTML = '<div class="error-msg">Ошибка: ' + (err || r.status) + '</div>';
                    return;
                }
                const logs = await r.json();
                if (!logs.length) { c.innerHTML = '<div class="loading">Логов пока нет</div>'; return; }
                let h = '<div class="log-header"><div style="width:70px;">Время</div><div style="width:60px;">User</div><div style="flex:1;">Endpoint</div><div style="width:80px;">Модель</div><div style="width:50px;">Токены</div><div style="width:50px;">Время</div><div style="width:50px;">Статус</div></div>';
                logs.forEach(l => {
                    const t = new Date(l.created_at);
                    const time = t.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
                    const date = t.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
                    const model = (l.model||'').replace('openai/','').replace('google/','').replace('anthropic/','').substring(0,12);
                    const color = l.status === 'success' ? '#22c55e' : '#ef4444';
                    h += `<div class="log-row" onclick="loadLogDetail('${l.id}')">
                        <div style="width:70px;color:var(--text-muted);">${date} ${time}</div>
                        <div style="width:60px;">${l.user_id||'—'}</div>
                        <div style="flex:1;font-weight:500;">${l.endpoint||''}<span style="color:var(--text-muted);font-weight:400;margin-left:4px;">${l.prompt_key||''}</span></div>
                        <div style="width:80px;color:var(--text-muted);">${model}</div>
                        <div style="width:50px;">${l.total_tokens||0}</div>
                        <div style="width:50px;color:var(--text-muted);">${l.response_time_ms||0}ms</div>
                        <div style="width:50px;"><span style="color:${color};">●</span></div>
                    </div>`;
                });
                c.innerHTML = h;
            } catch(e) { c.innerHTML = '<div class="error-msg">Ошибка загрузки</div>'; }
        }

        async function loadLogDetail(logId) {
            const c = document.getElementById('logsContent');
            c.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const r = await api('/api/admin/logs/' + logId);
                if (!r.ok) return;
                const l = await r.json();
                const t = new Date(l.created_at).toLocaleString('ru-RU');
                let h = `<button class="btn-back" onclick="loadLogs()">← Назад к логам</button>
                    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
                        <div><span style="font-size:11px;color:var(--text-muted);">Время:</span> <span style="font-size:13px;">${t}</span></div>
                        <div><span style="font-size:11px;color:var(--text-muted);">User:</span> <span style="font-size:13px;">${l.user_id||'—'}</span></div>
                        <div><span style="font-size:11px;color:var(--text-muted);">Endpoint:</span> <span style="font-size:13px;font-weight:600;">${l.endpoint}</span></div>
                        <div><span style="font-size:11px;color:var(--text-muted);">Модель:</span> <span style="font-size:13px;">${l.model||'—'}</span></div>
                        <div><span style="font-size:11px;color:var(--text-muted);">Токены:</span> <span style="font-size:13px;">${l.input_tokens||0} → ${l.output_tokens||0} (${l.total_tokens||0})</span></div>
                        <div><span style="font-size:11px;color:var(--text-muted);">Время:</span> <span style="font-size:13px;">${l.response_time_ms||0}ms</span></div>
                    </div>`;
                [{t:'Системный промпт',c:l.system_prompt},{t:'User Context',c:l.user_context},{t:'История сообщений',c:l.messages?JSON.stringify(l.messages,null,2):null},{t:'Запрос пользователя',c:l.user_message},{t:'Ответ AI',c:l.ai_response},{t:'Ошибка',c:l.error_message}].forEach(s => {
                    if (!s.c) return;
                    h += `<details style="margin-bottom:8px;"><summary style="cursor:pointer;font-size:13px;font-weight:600;padding:8px 0;">${s.t}</summary><pre style="font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-word;padding:12px;background:var(--bg-secondary);border-radius:8px;max-height:400px;overflow-y:auto;">${escapeHtml(s.c)}</pre></details>`;
                });
                c.innerHTML = h;
            } catch(e) { c.innerHTML = '<div class="error-msg">Ошибка</div>'; }
        }

        // Init
        if (adminToken) {
            api('/api/admin/prompts').then(r => {
                if (r.ok) showApp();
                else doLogout();
            }).catch(() => doLogout());
        }
    </script>
</body>
</html>
